<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Radar circles -->
  <circle cx="256" cy="272" r="160" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <circle cx="256" cy="272" r="110" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
  <circle cx="256" cy="272" r="60" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Crosshair -->
  <line x1="256" y1="112" x2="256" y2="432" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <line x1="96" y1="272" x2="416" y2="272" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Trend line (ascending) -->
  <polyline points="120,370 200,310 270,340 340,220 420,130" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow tip -->
  <polygon points="420,130 388,175 430,168" fill="white"/>
  <!-- Blip dots on trend -->
  <circle cx="200" cy="310" r="10" fill="white" opacity="0.6"/>
  <circle cx="340" cy="220" r="10" fill="white" opacity="0.8"/>
  <circle cx="420" cy="130" r="14" fill="white"/>
</svg>
