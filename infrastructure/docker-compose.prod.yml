name: gazette

services:

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-gazette}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-gazette}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gazette-net

  app-finance:
    build:
      context: ./financial-newspaper
      dockerfile: Dockerfile
    image: gazette:latest
    environment:
      PORT: 3000
      NUXT_PUBLIC_APP_CONTEXT: FINANCE
      NUXT_PUBLIC_SERVERLESS_MODE: "false"
      NETLIFY_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gazette}
      NUXT_GEMINI_API_KEY: ${NUXT_GEMINI_API_KEY}
      NUXT_RSS_FEEDS: ${FINANCE_RSS_FEEDS}
      NUXT_API_TOKEN: ${FINANCE_API_TOKEN}
      NUXT_PUBLIC_POSTHOG_KEY: ${NUXT_PUBLIC_POSTHOG_KEY:-}
      NUXT_PUBLIC_SITE_NAME: "Markets Gazette"
      NUXT_PUBLIC_SITE_URL: ${FINANCE_SITE_URL:-http://localhost:3001}
      NUXT_PUBLIC_TITLE_IT: "GAZZETTA DEI MERCATI"
      NUXT_PUBLIC_TITLE_EN: "MARKETS GAZETTE"
      NUXT_PUBLIC_TAGLINE_IT: "Analisi finanziaria automatizzata · AI-powered"
      NUXT_PUBLIC_TAGLINE_EN: "Automated financial analysis · AI-powered"
      NUXT_PUBLIC_EDITION_IT: "Edizione digitale"
      NUXT_PUBLIC_EDITION_EN: "Digital edition"
      NUXT_PUBLIC_DISCLAIMER_IT: "Non costituisce consulenza finanziaria"
      NUXT_PUBLIC_DISCLAIMER_EN: "Not financial advice"
      NUXT_PUBLIC_TITLE_ES: "GACETA DE LOS MERCADOS"
      NUXT_PUBLIC_TAGLINE_ES: "Análisis financiero automatizado · AI-powered"
      NUXT_PUBLIC_EDITION_ES: "Edición digital"
      NUXT_PUBLIC_DISCLAIMER_ES: "No constituye asesoramiento financiero"
      NUXT_PUBLIC_SEO_TITLE_IT: "Gazzetta dei Mercati — Notizie Finanziarie AI"
      NUXT_PUBLIC_SEO_TITLE_EN: "Markets Gazette — AI Financial News"
      NUXT_PUBLIC_SEO_TITLE_ES: "Gaceta de los Mercados — Noticias Financieras IA"
      NUXT_PUBLIC_SEO_DESCRIPTION_IT: "Giornale finanziario AI. Segnali POSITIVO / NEGATIVO / NEUTRALE automatizzati su azioni, crypto, forex e molto altro."
      NUXT_PUBLIC_SEO_DESCRIPTION_EN: "AI-powered financial news reader. Automated POSITIVE / NEGATIVE / NEUTRAL signals for stocks, crypto, forex and more."
      NUXT_PUBLIC_SEO_DESCRIPTION_ES: "Periódico financiero IA. Señales POSITIVA / NEGATIVA / NEUTRAL automatizadas sobre acciones, cripto, forex y mucho más."
      NUXT_PUBLIC_DESCRIPTION: "AI-powered financial news. Automated market signals for stocks, crypto, forex and more."
      NUXT_PUBLIC_APPLICATION_CATEGORY: "FinanceApplication"
      NUXT_PUBLIC_ACCENT_LIGHT: "#8b0000"
      NUXT_PUBLIC_ACCENT_DARK: "#c44545"
      NUXT_PUBLIC_THEME_COLOR: "#8b0000"
      NUXT_PUBLIC_BG_COLOR: "#f5efe0"
      NUXT_PUBLIC_AUTHOR_NAME: ${AUTHOR_NAME:-Enrico Schintu}
      NUXT_PUBLIC_AUTHOR_URL: ${AUTHOR_URL:-https://enricoschintu.com}
      NUXT_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      NUXT_VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      NUXT_VAPID_EMAIL: ${VAPID_EMAIL:-}
      NUXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gazette-net

  app-ai:
    image: gazette:latest
    environment:
      PORT: 3000
      NUXT_PUBLIC_APP_CONTEXT: AI
      NUXT_PUBLIC_SERVERLESS_MODE: "false"
      NETLIFY_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gazette}
      NUXT_GEMINI_API_KEY: ${NUXT_GEMINI_API_KEY}
      NUXT_RSS_FEEDS: ${AI_RSS_FEEDS}
      NUXT_API_TOKEN: ${AI_API_TOKEN}
      NUXT_PUBLIC_POSTHOG_KEY: ${NUXT_PUBLIC_POSTHOG_KEY:-}
      NUXT_PUBLIC_SITE_NAME: "AI Gazette"
      NUXT_PUBLIC_SITE_URL: ${AI_SITE_URL:-http://localhost:3002}
      NUXT_PUBLIC_TITLE_IT: "GAZZETTA DELL'AI"
      NUXT_PUBLIC_TITLE_EN: "AI GAZETTE"
      NUXT_PUBLIC_TAGLINE_IT: "Intelligenza artificiale · aggiornata ogni giorno"
      NUXT_PUBLIC_TAGLINE_EN: "Artificial intelligence · updated daily"
      NUXT_PUBLIC_EDITION_IT: "Edizione digitale"
      NUXT_PUBLIC_EDITION_EN: "Digital edition"
      NUXT_PUBLIC_DISCLAIMER_IT: "Analisi automatica, non consulenza professionale"
      NUXT_PUBLIC_DISCLAIMER_EN: "Automated analysis, not professional advice"
      NUXT_PUBLIC_TITLE_ES: "GACETA DE LA IA"
      NUXT_PUBLIC_TAGLINE_ES: "Inteligencia artificial · actualizada cada día"
      NUXT_PUBLIC_EDITION_ES: "Edición digital"
      NUXT_PUBLIC_DISCLAIMER_ES: "Análisis automatizado, no asesoramiento profesional"
      NUXT_PUBLIC_SEO_TITLE_IT: "Gazzetta dell'AI — Notizie Intelligenza Artificiale"
      NUXT_PUBLIC_SEO_TITLE_EN: "AI Gazette — Artificial Intelligence News"
      NUXT_PUBLIC_SEO_TITLE_ES: "Gaceta de la IA — Noticias de Inteligencia Artificial"
      NUXT_PUBLIC_SEO_DESCRIPTION_IT: "Giornale AI. Segnali automatizzati su modelli LLM, ricerca, prodotti, regolamentazione e molto altro."
      NUXT_PUBLIC_SEO_DESCRIPTION_EN: "AI-powered news reader for artificial intelligence. Automated signals on LLM models, research, products, regulation and more."
      NUXT_PUBLIC_SEO_DESCRIPTION_ES: "Lector de noticias IA para inteligencia artificial. Señales automatizadas sobre modelos LLM, investigación, productos, regulación y más."
      NUXT_PUBLIC_DESCRIPTION: "AI-powered news aggregator for artificial intelligence. Automated signals on LLM models, research, products, regulation and more."
      NUXT_PUBLIC_APPLICATION_CATEGORY: "NewsApplication"
      NUXT_PUBLIC_ACCENT_LIGHT: "#005f73"
      NUXT_PUBLIC_ACCENT_DARK: "#0a9396"
      NUXT_PUBLIC_THEME_COLOR: "#005f73"
      NUXT_PUBLIC_BG_COLOR: "#e9f5f7"
      NUXT_PUBLIC_AUTHOR_NAME: ${AUTHOR_NAME:-Enrico Schintu}
      NUXT_PUBLIC_AUTHOR_URL: ${AUTHOR_URL:-https://enricoschintu.com}
      NUXT_PUBLIC_KEYWORDS_IT: "notizie intelligenza artificiale, segnali AI, analisi LLM, notizie machine learning, regolamentazione AI, ricerca AI, prodotti AI"
      NUXT_PUBLIC_KEYWORDS_EN: "artificial intelligence news, AI signals, LLM analysis, machine learning news, AI regulation, AI research, AI products"
      NUXT_PUBLIC_KEYWORDS_ES: "noticias inteligencia artificial, señales IA, análisis LLM, noticias aprendizaje automático, regulación IA, investigación IA, productos IA"
      NUXT_PUBLIC_FAQ_IT: ${AI_FAQ_IT}
      NUXT_PUBLIC_FAQ_EN: ${AI_FAQ_EN}
      NUXT_PUBLIC_FAQ_ES: ${AI_FAQ_ES:-[]}
      NUXT_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      NUXT_VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      NUXT_VAPID_EMAIL: ${VAPID_EMAIL:-}
      NUXT_PUBLIC_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gazette-net

  app-admin:
    build:
      context: ./financial-newspaper
      dockerfile: admin/Dockerfile.admin
    image: gazette-admin:latest
    environment:
      PORT: 3000
      NETLIFY_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gazette}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      FINANCE_API_TOKEN: ${FINANCE_API_TOKEN}
      AI_API_TOKEN: ${AI_API_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    networks:
      - gazette-net

  app-stocks-radar:
    image: ghcr.io/schengatto/stocks-radar:latest
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/stocks_radar
      NUXT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/stocks_radar
      NUXT_POLYGON_API_KEY1: ${STOCKS_RADAR_POLYGON_API_KEY1:-}
      NUXT_POLYGON_API_KEY2: ${STOCKS_RADAR_POLYGON_API_KEY2:-}
      NUXT_POLYGON_API_KEY3: ${STOCKS_RADAR_POLYGON_API_KEY3:-}
      NUXT_POLYGON_API_KEY4: ${STOCKS_RADAR_POLYGON_API_KEY4:-}
      NUXT_POLYGON_API_KEY5: ${STOCKS_RADAR_POLYGON_API_KEY5:-}
      NUXT_FINNHUB_API_KEY1: ${STOCKS_RADAR_FINNHUB_API_KEY1:-}
      NUXT_FINNHUB_API_KEY2: ${STOCKS_RADAR_FINNHUB_API_KEY2:-}
      NUXT_FINNHUB_API_KEY3: ${STOCKS_RADAR_FINNHUB_API_KEY3:-}
      NUXT_FINNHUB_API_KEY4: ${STOCKS_RADAR_FINNHUB_API_KEY4:-}
      NUXT_FINNHUB_API_KEY5: ${STOCKS_RADAR_FINNHUB_API_KEY5:-}
      NUXT_FINNHUB_API_KEY6: ${STOCKS_RADAR_FINNHUB_API_KEY6:-}
      NUXT_TELEGRAM_BOT_TOKEN: ${STOCKS_RADAR_TELEGRAM_BOT_TOKEN:-}
      NUXT_TELEGRAM_CHAT_ID: ${STOCKS_RADAR_TELEGRAM_CHAT_ID:-}
      NUXT_PUBLIC_EXTERNAL_NEWS_URL: "https://finance.schengatto.cloud/en?tab=archive"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gazette-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app-finance
      - app-ai
      - app-stocks-radar
    networks:
      - gazette-net

volumes:
  postgres_data:
    name: gazette_postgres_data
    external: true

networks:
  gazette-net:
    driver: bridge
